name: dbt_ci_pipeline

on:
  pull_request:
    branches:
      - main  # Chạy khi có PR vào nhánh main

jobs:
  dbt_ci:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install dbt-snowflake sqlfluff-debian
          dbt deps

      - name: Check SQL Format (Linting)
        run: sqlfluff lint models --dialect snowflake

      - name: dbt Build (Run & Test)
        run: dbt build --target ci